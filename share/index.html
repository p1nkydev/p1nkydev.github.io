<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .manual-link {
            margin-top: 20px;
            display: none;
        }
        .manual-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 20px;
            border: 2px solid #3498db;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p id="message">Redirecting...</p>
        <div class="manual-link" id="manualLink">
            <p>Automatic redirect failed.</p>
            <a href="#" id="storeButton">Open App Store</a>
        </div>
    </div>

    <script>
        function getMobileOS() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return "iOS";
            if (/android/i.test(userAgent)) return "Android";
            return "unknown";
        }

        function redirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const contentId = urlParams.get('id') || '';

            if (!contentId) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').textContent = 'Welcome! Please use a valid share link.';
                return;
            }

            const os = getMobileOS();

            if (os === "Android") {
                const appPackage   = 'ua.companyname.porada.android';
                const storeLink    = 'https://play.google.com/store/apps/details?id=' + appPackage;
                const webFallback  = 'https://p1nkydev.github.io/share?id=' + contentId;

                // intent:// URI tells Chrome / Chrome Custom Tabs to hand off to the app.
                // S.browser_fallback_url is used when the app is NOT installed — Chrome
                // opens that URL instead of the store, so point it at the Play Store link.
                // The #Intent...END block closes the Custom Tab and launches the app in one step.
                const intentUri =
                    `intent://share?id=${contentId}` +
                    `#Intent` +
                    `;scheme=https` +
                    `;package=${appPackage}` +
                    `;S.browser_fallback_url=${encodeURIComponent(storeLink)}` +
                    `;end`;

                // Navigate to the intent URI immediately.
                // Chrome Custom Tabs will close itself and open the app (or go to the store).
                window.location.replace(intentUri);

                // Safety net: if we're still here after 2.5 s the intent didn't fire
                // (e.g. some browsers block intent:// — fall through to a direct store link).
                setTimeout(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('message').textContent = 'Opening store...';
                    const ml = document.getElementById('manualLink');
                    ml.style.display = 'block';
                    document.getElementById('storeButton').href = storeLink;
                    // Also attempt the HTTPS deep link as a last resort
                    window.location.replace(storeLink);
                }, 2500);

            } else if (os === "iOS") {
                const storeLink   = 'https://apps.apple.com/app/com.companyname.porada';
                const appDeepLink = `https://p1nkydev.github.io/share?id=${contentId}`;
                const startTime   = Date.now();
                let   appOpened   = false;

                // iOS: Universal Links work fine; use the hidden-iframe trick +
                // visibilitychange as before (Safari/WebKit does fire it).
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = appDeepLink;
                document.body.appendChild(iframe);

                setTimeout(() => {
                    if (!appOpened) window.location.href = appDeepLink;
                }, 500);

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) appOpened = true;
                });

                const iv = setInterval(() => {
                    if (appOpened) { clearInterval(iv); return; }
                    if (Date.now() - startTime > 2500) {
                        clearInterval(iv);
                        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
                        window.location.href = storeLink;
                        setTimeout(() => {
                            document.getElementById('spinner').style.display = 'none';
                            document.getElementById('message').textContent = 'Opening store...';
                            const ml = document.getElementById('manualLink');
                            ml.style.display = 'block';
                            document.getElementById('storeButton').href = storeLink;
                        }, 1000);
                    }
                }, 100);

            } else {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').textContent = 'Please open this link on your mobile device.';
            }
        }

        window.onload = redirect;
    </script>
</body>
</html>
